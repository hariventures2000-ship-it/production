# ═══════════════════════════════════════════════════════════════════
# MERVI API GATEWAY — Configuration
# ═══════════════════════════════════════════════════════════════════

server:
  port: 8080

spring:
  application:
    name: mervi-api-gateway

  # ─── Redis (for Rate Limiting) ────────────────────────────────────
  data:
    redis:
      url: ${REDIS_URL:redis://localhost:6379}

  # ─── Gateway Routing ──────────────────────────────────────────────
  cloud:
    compatibility-verifier:
      enabled: false
    gateway:
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins: 
              - "http://localhost:3000" # Super Admin / Frontend Client
              - "http://localhost:3001" # CEO
              - "http://localhost:3003" # HR
              - "http://localhost:3005" # Employee
              - "http://localhost:3006" # MD
              - "http://localhost:3007" # Team Lead
              - "http://localhost:3009" # Client Portal
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
            maxAge: 3600

      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials
        # Rate limiter disabled for local dev (requires KeyResolver bean)
        # - name: RequestRateLimiter
        #   args:
        #     redis-rate-limiter.replenishRate: 10
        #     redis-rate-limiter.burstCapacity: 20
        #     redis-rate-limiter.requestedTokens: 1

      routes:
        # Auth Service Route
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/auth/**
          filters:
            # - JwtAuthenticationFilter
            # - TenantResolutionFilter

        # User Service Route
        - id: user-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/v1/users/**
          filters:
            # - JwtAuthenticationFilter
            # - RbacAuthorizationFilter

        # Tenant Service Route
        - id: tenant-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/v1/tenants/**
          filters:
            # - JwtAuthenticationFilter
            # - RbacAuthorizationFilter

        # HR Service Route
        - id: hr-service
          uri: http://localhost:8086
          predicates:
            - Path=/api/v1/hr/**
          filters:
            # - JwtAuthenticationFilter
            # - RbacAuthorizationFilter

        # Employee Service Route
        - id: employee-service
          uri: http://localhost:8088
          predicates:
            - Path=/api/v1/employee/**
          filters:
            # - JwtAuthenticationFilter
            # - RbacAuthorizationFilter

        # Client Service Route
        - id: client-service
          uri: http://localhost:8089
          predicates:
            - Path=/api/v1/client-portal/**, /api/v1/tickets/**, /api/v1/client/**
          filters:
            # - JwtAuthenticationFilter
            # - RbacAuthorizationFilter

        # Notification Service WS Route (must be before HTTP route to match /ws/** first)
        - id: notification-service-ws
          uri: ws://localhost:8090
          predicates:
            - Path=/api/v1/notifications/ws/**

        # Notification Service REST Route
        - id: notification-service
          uri: http://localhost:8090
          predicates:
            - Path=/api/v1/notifications/**
          filters:
            # - JwtAuthenticationFilter
            # - RbacAuthorizationFilter

        # Analytics Service Route
        - id: analytics-service
          uri: http://localhost:8091
          predicates:
            - Path=/api/v1/analytics/**
          filters:
            # - JwtAuthenticationFilter
            # - RbacAuthorizationFilter

        # AI Service Route
        - id: ai-service
          uri: http://localhost:8092
          predicates:
            - Path=/api/v1/ai/**
          filters:
            # - JwtAuthenticationFilter
            # - RbacAuthorizationFilter

# ─── JWT Configuration ──────────────────────────────────────────────
mervi:
  jwt:
    access-secret: ${JWT_ACCESS_SECRET:mervi-dev-access-secret-minimum-32-chars}

# ─── Actuator ────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized
